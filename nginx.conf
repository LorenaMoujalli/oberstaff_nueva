server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Static Assets Caching
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Images, Fonts, etc.
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Redirigir de forma segura las peticiones de guardado al micro-servicio Node.js en segundo plano
    location /api/guardar-lead {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Main Application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 Handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
